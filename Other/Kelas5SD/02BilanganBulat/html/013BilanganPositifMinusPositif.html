			for (var i=0; i<Arr.length; i++){
				var r = Math.floor(Math.random() * Arr.length);

				if (!startTime) startTime = timestamp;

				}

			let startTime = null; //perlu di null kan lagi setiap mau di animasi kan

			requestAnimationFrame(animate);
		}
		function mcAnimateStep(str){
			function animate(timestamp) {
				if (!startTime) startTime = timestamp;
				const elapsed = timestamp - startTime;
				var sdt = Math.min(elapsed / duration * 180 , 180);
				const progress = 10*Math.sin(sdt*Math.PI/180);

				//mc.style.scale = ''+progress+'';
				mc.style.top = ''+(mc.yy+progress)+'px';
				if (elapsed < duration) {
					requestAnimationFrame(animate);
				} else {
					//Remote();
					//console.log('Animasi selesai.');
				}
			}
			var mc = document.getElementById(str);
			let startTime = null;// perlu di null kan lagi setiap mau di animasi kan
			const duration = 200; // Durasi 0.5 detik dalam milidetik
			requestAnimationFrame(animate);
		}
		function mcAnimateAlpha(str,tf){
			function animate(timestamp) {
				if (!startTime) startTime = timestamp;
				const elapsed = timestamp - startTime;
				var sdt = Math.min(elapsed / duration * 90 , 90);
				if(tf)	progress = Math.sin(sdt*Math.PI/180);
				else 	progress = 1-Math.sin(sdt*Math.PI/180);
				
				mc.style.opacity = ''+progress+'';
				if (elapsed < duration) {
					requestAnimationFrame(animate);
				} else {
					Remote();
					//console.log('Animasi selesai.');
				}
			}
			var mc = document.getElementById(str);
			let startTime = null;// perlu di null kan lagi setiap mau di animasi kan
			const duration = 1500; // Durasi 0.5 detik dalam milidetik
			requestAnimationFrame(animate);
		}
