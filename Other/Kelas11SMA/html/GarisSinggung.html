			for (var i=0; i<Arr.length; i++){
				var r = Math.floor(Math.random() * Arr.length);
				var a = Arr[i];
				Arr[i] = Arr[r];
				Arr[r] = a;

			else 				return ff
		}

		function DrawLuar(canv,x0,y0,x1,y1,x2,y2,x3,y3,x4,y4){
			const canvas = document.getElementById(canv);
			const ctx = canvas.getContext('2d');
			
			ctx.clearRect(0,0, canvas.width, canvas.height);
			ctx.beginPath();
			ctx.strokeStyle = '#000000'; // Warna merah
			ctx.lineWidth = 2; // Ketebalan garis 5px
			ctx.lineJoin = "round";
			
			ctx.moveTo(x0,y0);
			ctx.lineTo(x1,y1);
			ctx.lineTo(x2,y2);
			ctx.lineTo(x3,y3);
			ctx.lineTo(x4,y4);
			ctx.moveTo(x0,y0);
			ctx.lineTo(x3,y3);
			ctx.stroke();

			tBL.style.top = y2+'px';

			tQL.style.left = x3+'px';

			ctx.strokeStyle = '#FF6600'; // Warna merah

			//Rbesar

		function GSPLuar(){
			var xP = xypusat[0][0];
			var yP = xypusat[0][1];
			var xQ = xypusat[1][0];
			var yQ = xypusat[1][1];
			var R = Rbesar;
			var r = Rkecil;
			var PQ = xQ-xP;
			
			var AB = Math.sqrt(PQ**2 - (R-r)**2);
			var t = (R-r)*AB/PQ;
			var x = (R-r)**2 / PQ;
			
			var m = -t/x;
			var sdt = -Math.atan2(t,x)
			
			var xA = xP + R*Math.cos(sdt);
			var yA = yP + R*Math.sin(sdt);
			
			var xB = xQ + r*Math.cos(sdt);
			var yB = yQ + r*Math.sin(sdt);
			
			var xRr = xP + (R-r)*Math.cos(sdt);
			var yRr = yP + (R-r)*Math.sin(sdt);
			
			DrawLuar('garisLuar',xP,yP,xA,yA,xB,yB,xQ,yQ,xRr,yRr);
		}
		function GSPDalam(){
			var xP = xypusat[0][0];
			var yP = xypusat[0][1];
			var xQ = xypusat[1][0];
			var yQ = xypusat[1][1];
			var R = Rbesar;
			var r = Rkecil;
			var PQ = xQ-xP;
			
			var AB = Math.sqrt(PQ**2 - (R+r)**2);
			var t = (R+r)*AB/PQ;
			var x = AB**2 / PQ;
			
			var m = t/x;
			var sdt = Math.atan2(t,x)
			var sdt90 = -90*Math.PI/180+Math.atan2(t,x)
			
			var xA = xP + R*Math.cos(sdt90);
			var yA = yP + R*Math.sin(sdt90);
			
			var xB = xQ + r*Math.cos(sdt90+180*Math.PI/180);
			var yB = yQ + r*Math.sin(sdt90+180*Math.PI/180);
			
			var xRr = xQ + (R+r)*Math.cos(sdt90+180*Math.PI/180);
			var yRr = yQ + (R+r)*Math.sin(sdt90+180*Math.PI/180);
			
			DrawDalam('garisDalam',xP,yP,xRr,yRr,xQ,yQ,xA,yA,xB,yB);
		}
		
		GSPLuar();
		GSPDalam();

	<script>
		var selectedEl = null;
		const controller = new AbortController();
        function selectElement(el) {
            UnselectElement(el)
            selectedEl = el;
            //selectedEl.classList.add('terseleksi');
        }
        function UnselectElement(el) {
            if (selectedEl) {
                //selectedEl.classList.remove('terseleksi');
                //selectedEl.classList.remove('dropbenar');
				selectedEl = null;
            }
        }
		function setupDraggable(el,mc) {
			//var xmax = (mc.offsetWidth-el.offsetWidth);
			//var ymax = (mc.offsetHeight-el.offsetHeight);
			//var xmax = (myBG.w-el.offsetWidth/2);
			//var ymax = (myBG.h-el.offsetHeight/2);
			//var xmin = el.offsetWidth/2;
			//var ymin = el.offsetHeight/2;
			var xmax = (mc.w-100);
			var ymax = (mc.h-100);
			var xmin = mc.x+40;
			var ymin = mc.y+40;
			let startX=0, startY=0, initialX=0, initialY=0;
			let newX=0, newY=0;
			
            el.addEventListener('mousedown', dragMouseDown, { signal: controller.signal });
            el.addEventListener('touchstart', dragMouseDown, { signal: controller.signal }, { passive: false });
			
			el.ff = false;
            function dragMouseDown(e) {
                e.preventDefault();
                selectElement(el);
				if(e.type==="touchstart"){
					startX = e.touches[0].clientX;
					startY = e.touches[0].clientY;
					initialX = el.offsetLeft;
					initialY = el.offsetTop;
					document.addEventListener('touchend', dragMouseUp);
					document.addEventListener('touchmove', dragMouseMove, { passive: false });
				}else{
					startX = e.clientX;
					startY = e.clientY;
					initialX = el.offsetLeft;
					initialY = el.offsetTop;
					document.addEventListener('mouseup', dragMouseUp);
					document.addEventListener('mousemove', dragMouseMove);
				}
				if(el==skalaP){
					el.Rmin = 5;
					el.Rmax = 200;
					el.xmin = Math.max( 30 ,  xypusat[0][0]-(jarak-Rkecil-5));
					el.xmax = Math.min(xypusat[0][0]-(Rkecil+5)  , xypusat[1][0]-(jarak-Rkecil));
				}else{
					el.Rmin = 5;
					el.Rmax = 200;
					el.xmin = xypusat[1][0]+5;
					el.xmax = Math.min(xypusat[1][0]+(Rbesar-5)  , xypusat[1][0]+(jarak-Rbesar-5));
				}
				DrawElemen();
            }

            function dragMouseMove(e) {
                e.preventDefault();
				let deltaX=0;
				let deltaY=0;
				if(e.type==="touchmove"){
					deltaX = (e.touches[0].clientX - startX) / scl;
					deltaY = (e.touches[0].clientY - startY) / scl;
				}else{
					deltaX = (e.clientX - startX) / scl;
					deltaY = (e.clientY - startY) / scl;
				}
				newX = initialX + deltaX;
				newX = Math.max(el.xmin,Math.min(el.xmax,newX));
				
				el.style.left = newX + "px";
				if(el==skalaP){
					Rbesar = Math.abs(newX-xypusat[0][0]);
				}else{
					Rkecil = Math.abs(newX-xypusat[1][0]);
				}
				DrawElemen();
            }
			
            function dragMouseUp() {
                document.removeEventListener('mouseup', dragMouseUp);
                document.removeEventListener('mousemove', dragMouseMove);
                document.removeEventListener('touchend', dragMouseUp);
                document.removeEventListener('touchmove', dragMouseMove);
				CekDrop();
				DrawElemen();
            }
			function CekDrop() {
				//XYbenda();
				UnselectElement(el);
			}
			
        }
		function DrawLingkaran(canv,xo,yo,rr){
			const canvas = document.getElementById(canv);
			const ctx = canvas.getContext('2d');
			
			ctx.clearRect(0,0, canvas.width, canvas.height);
			ctx.beginPath();
			ctx.strokeStyle = '#000000'; // Warna merah
			ctx.lineWidth = 2; // Ketebalan garis 5px
			ctx.lineJoin = "round";
			
			ctx.arc(xo, yo, rr, 0, 2 * Math.PI);
			ctx.closePath();
			ctx.stroke();
			return 0;
		}
		function Koma2Angka(n){
			return StringDesimal(Math.round(n*100)/100);
		}
		function Koma1Angka(n){
			return StringDesimal(Math.round(n*10)/10);
		}
		function TanpaKoma(n){
			return Math.round(n);
		}
		function DrawElemen(){
			var lingkarP = DrawLingkaran('lingkaranP',xypusat[0][0],xypusat[0][1],Rbesar);
			var lingkarQ = DrawLingkaran('lingkaranQ',xypusat[1][0],xypusat[1][1],Rkecil);
			GSPLuar();
			GSPDalam();
		}
	</script>
