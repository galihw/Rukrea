		function RandomAngkaAtoB(a,b){ 
			var r = a+Math.ceil(Math.random() * b);

		}
		function RandomMyArray(Arr){
			for (var i=0; i<Arr.length; i++){
				var r = Math.floor(Math.random() * Arr.length);
				var a = Arr[i];
				Arr[i] = Arr[r];
				Arr[r] = a;
			}
			return Arr
		}
		function StringDesimal(ff){
			var strff = ""+ff;
			const gg = strff.split(".");
			if(gg.length==2)	return gg[0]+","+gg[1];
			else 				return ff
		}

    <script>
		
		function DrawAngle(n1,n2,n3){
			const xo = arTetap[n1].offsetLeft;
			const yo = arTetap[n1].offsetTop;
			const xp = arTetap[n2].offsetLeft;
			const yp = arTetap[n2].offsetTop;
			const xq = arTetap[n3].offsetLeft;
			const yq = arTetap[n3].offsetTop;
			
			// Sudut dalam derajat (0 derajat ada di posisi jam 3)
            var angleA = Math.atan2(yp - yo, xp - xo);
            var angleC = Math.atan2(yq - yo, xq - xo);
			
			degreeA = angleA*180/Math.PI;
			degreeC = angleC*180/Math.PI;
			var ddegree = Math.abs(degreeC-degreeA);
			
			var cvrtA = 0;
			var cvrtC = 0;
			if(degreeA>=-180 && degreeA<0)	cvrtA = degreeA+360; else cvrtA = degreeA;
			if(degreeC>=-180 && degreeC<0)	cvrtC = degreeC+360; else cvrtC = degreeC;
			var cvrtd = degreeC-degreeA;
			
			//console.log(cvrtd)
			var ff1,ff2,ff3,ff;
			ff1 = cvrtd<=0 && cvrtd>=-180;
			ff2 = cvrtd>=180;
			ff = ff1 || ff2;
			return [xo,yo,angleA,angleC,ff];
		}

			// Sudut dalam derajat (0 derajat ada di posisi jam 3)

			degreeA = angleA*180/Math.PI;

			var cvrtA = 0;

			if(degreeC>=-180 && degreeC<0)	cvrtC = degreeC+360; else cvrtC = degreeC;

			//console.log(cvrtd)

			ff2 = cvrtd>=180;

		}

	<script>
		var selectedEl = null;
		const controller = new AbortController();
        function selectElement(el) {
            UnselectElement(el)
            selectedEl = el;
            //selectedEl.classList.add('terseleksi');
        }
        function UnselectElement(el) {
            if (selectedEl) {
                //selectedEl.classList.remove('terseleksi');
                //selectedEl.classList.remove('dropbenar');
				selectedEl = null;
            }
        }
		function setupDraggable(el,mc) {
			//var xmax = (mc.offsetWidth-el.offsetWidth);
			//var ymax = (mc.offsetHeight-el.offsetHeight);
			//var xmax = (myBG.w-el.offsetWidth/2);
			//var ymax = (myBG.h-el.offsetHeight/2);
			//var xmin = el.offsetWidth/2;
			//var ymin = el.offsetHeight/2;
			var xmax = (mc.w-el.offsetWidth/2);
			var ymax = (mc.h-el.offsetHeight/2);
			var xmin = mc.x+40;
			var ymin = mc.y+40;
			let startX=0, startY=0, initialX=0, initialY=0;
			let newX=0, newY=0;
            el.addEventListener('mousedown', dragMouseDown, { signal: controller.signal });
            el.addEventListener('touchstart', dragMouseDown, { signal: controller.signal }, { passive: false });
			
			el.ff = false;
            function dragMouseDown(e) {
                e.preventDefault();
                selectElement(el);
				if(e.type==="touchstart"){
					startX = e.touches[0].clientX;
					startY = e.touches[0].clientY;
					initialX = el.offsetLeft;
					initialY = el.offsetTop;
					document.addEventListener('touchend', dragMouseUp);
					document.addEventListener('touchmove', dragMouseMove, { passive: false });
				}else{
					startX = e.clientX;
					startY = e.clientY;
					initialX = el.offsetLeft;
					initialY = el.offsetTop;
					document.addEventListener('mouseup', dragMouseUp);
					document.addEventListener('mousemove', dragMouseMove);
				}
				swapzindex(el.no);
				DrawElemen();
            }

            function dragMouseMove(e) {
                e.preventDefault();
				let deltaX=0;
				let deltaY=0;
				if(e.type==="touchmove"){
					deltaX = (e.touches[0].clientX - startX) / scl;
					deltaY = (e.touches[0].clientY - startY) / scl;
				}else{
					deltaX = (e.clientX - startX) / scl;
					deltaY = (e.clientY - startY) / scl;
				}
				newX = initialX + deltaX;
				newY = initialY + deltaY;
				newX = Math.max(xmin,Math.min(xmax,newX));
				newY = Math.max(ymin,Math.min(ymax,newY));
				
				var ddx = newX-320;
				var ddy = newY-220;
				var sdt0 = Math.atan2(ddy,ddx);
				var sdt0_C = Math.round(sdt0*180/Math.PI)*Math.PI/180;
				newX = 320+100*Math.cos(sdt0_C);
				newY = 220+100*Math.sin(sdt0_C);
				
				if(el.i==0){
					xybtn[1][0] = 320+100*Math.cos(sdt0_C+Math.PI);
					xybtn[1][1] = 220+100*Math.sin(sdt0_C+Math.PI);
					arTetap[1].style.left = xybtn[1][0]+'px';
					arTetap[1].style.top = xybtn[1][1]+'px';
				}else if(el.i==1){
					xybtn[0][0] = 320+100*Math.cos(sdt0_C+Math.PI);
					xybtn[0][1] = 220+100*Math.sin(sdt0_C+Math.PI);
					arTetap[0].style.left = xybtn[0][0]+'px';
					arTetap[0].style.top = xybtn[0][1]+'px';
				}else if(el.i==5 || el.i==6){
					xybtn[7][0] = (xybtn[5][0]+xybtn[6][0])/2;
					xybtn[7][1] = (xybtn[5][1]+xybtn[6][1])/2;
					arTetap[7].style.left = xybtn[7][0]+'px';
					arTetap[7].style.top = xybtn[7][1]+'px';
				}
				
				//el.x = newX;
				//el.y = newY;
				el.style.left = newX + "px";
				el.style.top = newY + "px";
				xybtn[el.i][0] = newX;
				xybtn[el.i][1] = newY;
				DrawElemen()
            }
			
            function dragMouseUp() {
                document.removeEventListener('mouseup', dragMouseUp);
                document.removeEventListener('mousemove', dragMouseMove);
                document.removeEventListener('touchend', dragMouseUp);
                document.removeEventListener('touchmove', dragMouseMove);
				CekDrop();
				DrawElemen();
            }
			function CekDrop() {
				//XYbenda();
				UnselectElement(el);
			}
			
			function swapzindex(no){
				const potong = arFIFO.splice(no, 1)[0];
				arFIFO.push(potong);

	<script>

		function mcAnimateStep(mc,x0,y0,dx,dy,tf){
			function animate(timestamp) {
				if (!startTime) startTime = timestamp;
				const elapsed = timestamp - startTime;
				var sdt = Math.min(elapsed / duration * 90 , 90);
				const progress = Math.sin(sdt*Math.PI/180);
				var xprog,yprog;
				if(tf){
					const progrot = 180*Math.sin(sdt*Math.PI/180);
					xprog = x0+(dx)*progress;
					yprog = y0+(dy)*progress;
					mc.style.transform = "rotate("+progrot+"deg)";
				}else{
					xprog = x0+dx*progress;
					yprog = y0+dy*progress;
				}
				
				//mc.style.scale = ''+progress+'';
				mc.style.left = ''+(xprog)+'px';
				mc.style.top = ''+(yprog)+'px';
				if (elapsed < duration) {
					requestAnimationFrame(animate);
				} else {
					Remote();
					//console.log('Animasi selesai.');
				}
			}
			//var mc = document.getElementById(str);
			let startTime = null;// perlu di null kan lagi setiap mau di animasi kan
			const duration = 1000; // Durasi 0.5 detik dalam milidetik
			requestAnimationFrame(animate);
		}
		function mcAnimateAlpha(mc){
			function animate(timestamp) {
				if (!startTime) startTime = timestamp;
				const elapsed = timestamp - startTime;
				var sdt = Math.min(elapsed / duration * 90 , 90);
				const progress = 1-Math.sin(sdt*Math.PI/180);
				
				mc.style.opacity = ''+progress+'';
				if (elapsed < duration) {
					requestAnimationFrame(animate);
				} else {
					//Remote();
					//console.log('Animasi selesai.');
				}
			}
			//var mc = document.getElementById(str);
			let startTime = null;// perlu di null kan lagi setiap mau di animasi kan
			const duration = 1000; // Durasi 0.5 detik dalam milidetik
			requestAnimationFrame(animate);
		}
		function mcAnimateRotate(mc){
			function animate(timestamp) {
				if (!startTime) startTime = timestamp;
				const elapsed = timestamp - startTime;
				var sdt = Math.min(elapsed / duration * 90 , 90);
				const progress = 180*Math.sin(sdt*Math.PI/180);
				const progx = -50*Math.sin(sdt*Math.PI/180);
				const progy = -50*Math.sin(sdt*Math.PI/180);
				mc.style.left = ''+(xybtn[0][0]+progx)+'px';
				mc.style.top = ''+(xybtn[0][1]+progy)+'px';
				
				mc.style.transform = "rotate("+progress+"deg)";
				if (elapsed < duration) {
					requestAnimationFrame(animate);
				} else {
					//Remote();
					//console.log('Animasi selesai.');
				}
			}
			mc.style.transformOrigin = "50% 50%";

			let startTime = null;// perlu di null kan lagi setiap mau di animasi kan
			const duration = 1000; // Durasi 0.5 detik dalam milidetik
