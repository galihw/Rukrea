		function RandomAngkaAtoB(a,b){ 
			var r = a+Math.ceil(Math.random() * b);
			return r;
		}
		function RandomMyArray(Arr){
			for (var i=0; i<Arr.length; i++){
				var r = Math.floor(Math.random() * Arr.length);
				var a = Arr[i];
				Arr[i] = Arr[r];
				Arr[r] = a;
			}
			return Arr
		}
		function StringDesimal(ff){
			var strff = ""+ff;
			const gg = strff.split(".");
			if(gg.length==2)	return gg[0]+","+gg[1];
			else 				return ff
		}
	</script>

    <script>
		
		function DrawAngle(n1,n2,n3){
			const xo = arTetap[n1].offsetLeft;
			const yo = arTetap[n1].offsetTop;
			const xp = arTetap[n2].offsetLeft;
			const yp = arTetap[n2].offsetTop;
			const xq = arTetap[n3].offsetLeft;
			const yq = arTetap[n3].offsetTop;
			
			// Sudut dalam derajat (0 derajat ada di posisi jam 3)
            var angleA = Math.atan2(yp - yo, xp - xo);
            var angleC = Math.atan2(yq - yo, xq - xo);
			
			degreeA = angleA*180/Math.PI;
			degreeC = angleC*180/Math.PI;
			var ddegree = Math.abs(degreeC-degreeA);
			
			var cvrtA = 0;
			var cvrtC = 0;
			if(degreeA>=-180 && degreeA<0)	cvrtA = degreeA+360; else cvrtA = degreeA;
			if(degreeC>=-180 && degreeC<0)	cvrtC = degreeC+360; else cvrtC = degreeC;
			var cvrtd = degreeC-degreeA;
			
			//console.log(cvrtd)
			var ff1,ff2,ff3,ff;
			ff1 = cvrtd<=0 && cvrtd>=-180;
			ff2 = cvrtd>=180;
			ff = ff1 || ff2;
			return [xo,yo,angleA,angleC,ff];
		}
    </script>

	<script>
		var selectedEl = null;

        function selectElement(el) {

        }
        function UnselectElement(el) {

		function setupDraggable(el,mc) {
			//var xmax = (mc.offsetWidth-el.offsetWidth);
			//var ymax = (mc.offsetHeight-el.offsetHeight);
			//var xmax = (myBG.w-el.offsetWidth/2);
			//var ymax = (myBG.h-el.offsetHeight/2);
			//var xmin = el.offsetWidth/2;
			//var ymin = el.offsetHeight/2;
			var xmax = mc.w-175;//(mc.w-175);
			var ymax = mc.h-175;//(mc.h-15);
			var xmin = mc.x-175;//+20//+175;
			var ymin = mc.y-175;//+20//+175;
			
			
			var sdt0B=0
			var sdt0A=0
			var sdt0_Deg=0
			var sdt0_C=0
			let startX=0, startY=0, initialX=0, initialY=0;
			let newX=0, newY=0;
            el.addEventListener('mousedown', dragMouseDown, { signal: controller.signal });
            el.addEventListener('touchstart', dragMouseDown, { signal: controller.signal }, { passive: false });
			
			el.ff = false;
            function dragMouseDown(e) {
                e.preventDefault();
                selectElement(el);
				if(e.type==="touchstart"){
					startX = e.touches[0].clientX;
					startY = e.touches[0].clientY;
					initialX = el.offsetLeft;
					initialY = el.offsetTop;
					deltaX = (e.touches[0].clientX - startX) / scl;
					deltaY = (e.touches[0].clientY - startY) / scl;
					document.addEventListener('touchend', dragMouseUp);
					document.addEventListener('touchmove', dragMouseMove, { passive: false });
				}else{
					startX = e.clientX;
					startY = e.clientY;
					initialX = el.offsetLeft;
					initialY = el.offsetTop;
					deltaX = (e.clientX - startX) / scl;
					deltaY = (e.clientY - startY) / scl;
					document.addEventListener('mouseup', dragMouseUp);
					document.addEventListener('mousemove', dragMouseMove);
					//bodibusur.style.transform = "scale(2)";
				}
            }

            function dragMouseMove(e) {
                e.preventDefault();
				let deltaX=0;
				let deltaY=0;
				if(e.type==="touchmove"){
					deltaX = (e.touches[0].clientX - startX) / scl;
					deltaY = (e.touches[0].clientY - startY) / scl;
				}else{
					deltaX = (e.clientX - startX) / scl;
					deltaY = (e.clientY - startY) / scl;
				}
				newX = initialX + deltaX;
				newY = initialY + deltaY;
				
				if(el==btnrotate){
					var ddx = newX-titikputar.x;
					var ddy = newY-titikputar.y;
					var sdt0 = Math.atan2(ddy,ddx);
					//console.log(dsdt,(360+sdt0*180/Math.PI)%360,sdt1-90,sdt1+90,sdt2-90,sdt2+90);
					
					if(Math.abs((360+sdt0*180/Math.PI)%360-sdt1-90)<3){
						sdt0=(sdt1+90)*Math.PI/180;
					}else if(Math.abs((360+sdt0*180/Math.PI)%360-sdt1-270)<3){
						sdt0=(sdt1+270)*Math.PI/180;
					}else if(Math.abs((360+sdt0*180/Math.PI)%360-sdt1+90)<3){
						sdt0=(sdt1-90)*Math.PI/180;
					}else if(Math.abs((360+sdt0*180/Math.PI)%360-sdt1+270)<3){
						sdt0=(sdt1-270)*Math.PI/180;
					}else if(Math.abs((360+sdt0*180/Math.PI)%360-sdt2-90)<3){
						sdt0=(sdt2+90)*Math.PI/180;
					}else if(Math.abs((360+sdt0*180/Math.PI)%360-sdt2-270)<3){
						sdt0=(sdt2+270)*Math.PI/180;
					}else if(Math.abs((360+sdt0*180/Math.PI)%360-sdt2+90)<3){
						sdt0=(sdt2-90)*Math.PI/180;
					}else if(Math.abs((360+sdt0*180/Math.PI)%360-sdt2+270)<3){
						sdt0=(sdt2-270)*Math.PI/180;
					}
					if(sdt0<0) sdt0+=360*Math.PI/180;
					
					var sdt0_C = Math.round(sdt0*180/Math.PI)*Math.PI/180;
					newX = titikputar.x+175*Math.cos(sdt0_C);
					newY = titikputar.y+175*Math.sin(sdt0_C);
					sdtbusur = sdt0*180/Math.PI;
					bodibusur.style.transform = "rotate("+(sdtbusur+90)+"deg)";
					el.style.left = newX + "px";
					el.style.top = newY + "px";
				}else{
					var dr = Math.sqrt((300-175-newX)**2 + (200-175-newY)**2);
					if(dr<10){
						newX = 300-175;
						newY = 200-175;
					}
					bodibusur.x = newX;
					bodibusur.y = newY;
					bodibusur.style.left = newX + "px";
					bodibusur.style.top = newY + "px";
					titikputar.x = bodibusur.x+175;
					titikputar.y = bodibusur.y+175;
					titikputar.style.left = ''+(titikputar.x)+'px';
					titikputar.style.top = ''+(titikputar.y)+'px';
					btnrotate.x = titikputar.x+175*Math.cos(sdtbusur*Math.PI/180);
					btnrotate.y = titikputar.y+175*Math.sin(sdtbusur*Math.PI/180);
					btnrotate.style.left = (btnrotate.x)+'px';
					btnrotate.style.top = (btnrotate.y)+'px';
				}
				//xybtn[el.i][0] = newX;
				//xybtn[el.i][1] = newY;
            }
			
            function dragMouseUp() {
                document.removeEventListener('mouseup', dragMouseUp);
                document.removeEventListener('mousemove', dragMouseMove);
                document.removeEventListener('touchend', dragMouseUp);
                document.removeEventListener('touchmove', dragMouseMove);
				CekDrop();
            }
			function CekDrop() {
				//XYbenda();
				UnselectElement(el);
			}
			
        }
		function DrawSudut(canv,a,b,c){
			var Ar = DrawAngle(a,b,c);
			const canvas = document.getElementById(canv);
			const ctx = canvas.getContext('2d');

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
			ctx.clearRect(0, 0, canvas.width, canvas.height);
			
			var rr = 50; // jari-jari lingkaran sudut
			ctx.save(); // Simpan state awal kanvas
			ctx.translate(rr, rr);
			ctx.beginPath();
			ctx.moveTo(0,0);
			//ctx.arc(Ar[3],Ar[4], 30, Ar[0], Ar[4], Ar[2]);//ctx.arc(x, y, radius, startAngle, endAngle, counterclockwise);
			ctx.arc(0,0, rr, Ar[2], Ar[3], Ar[4]);//ctx.arc(x, y, radius, startAngle, endAngle, counterclockwise);
			ctx.lineTo(0,0);
			ctx.fillStyle = '#0096c7';
			ctx.fill();
			ctx.closePath();
			ctx.restore(); // Kembalikan state kanvas seperti semula
			/*
			var sdtF = 0;
			if(!Ar[4]) 	sdtF = (Ar[3]-Ar[2])*180/Math.PI;
			else 		sdtF = (Ar[2]-Ar[3])*180/Math.PI;
			if(sdtF<0)	return 360+sdtF;
			else		return sdtF;
			*/
			//return sdtF;
			return (Ar[3]-Ar[2])*180/Math.PI;
		}
		function DrawGaris(canv){
			const canvas = document.getElementById(canv);
			const ctx = canvas.getContext('2d');
			
			ctx.clearRect(0, 0, canvas.width, canvas.height);
			ctx.beginPath();
			ctx.strokeStyle = '#000000'; // Warna merah
			ctx.lineWidth = 2; // Ketebalan garis 5px
			ctx.lineJoin = "round";
			
			//ctx.arc(300, 200, 100, 0, 2 * Math.PI);
			
			ctx.moveTo(xybtn[0][0],xybtn[0][1]);
			ctx.lineTo(xybtn[1][0],xybtn[1][1]);
			ctx.lineTo(300,200);
			ctx.lineTo(xybtn[2][0],xybtn[2][1]);
			ctx.lineTo(xybtn[0][0],xybtn[0][1]);
			
			ctx.closePath();
			ctx.stroke();
		}

	<script>

		function mcAnimateStep(mc,x0,y0,dx,dy,tf){
			function animate(timestamp) {
				if (!startTime) startTime = timestamp;
				const elapsed = timestamp - startTime;
				var sdt = Math.min(elapsed / duration * 90 , 90);
				const progress = Math.sin(sdt*Math.PI/180);
				var xprog,yprog;
				if(tf){
					const progrot = 180*Math.sin(sdt*Math.PI/180);
					xprog = x0+(dx)*progress;
					yprog = y0+(dy)*progress;
					mc.style.transform = "rotate("+progrot+"deg)";
				}else{
					xprog = x0+dx*progress;
					yprog = y0+dy*progress;
				}
				
				//mc.style.scale = ''+progress+'';
				mc.style.left = ''+(xprog)+'px';
				mc.style.top = ''+(yprog)+'px';
				if (elapsed < duration) {
					requestAnimationFrame(animate);
				} else {
					Remote();
					//console.log('Animasi selesai.');
				}
			}
			//var mc = document.getElementById(str);
			let startTime = null;// perlu di null kan lagi setiap mau di animasi kan
			const duration = 1000; // Durasi 0.5 detik dalam milidetik
			requestAnimationFrame(animate);
		}
		function mcAnimateAlpha(mc){
			function animate(timestamp) {
				if (!startTime) startTime = timestamp;
				const elapsed = timestamp - startTime;
				var sdt = Math.min(elapsed / duration * 90 , 90);
				const progress = 1-Math.sin(sdt*Math.PI/180);
				
				mc.style.opacity = ''+progress+'';
				if (elapsed < duration) {
					requestAnimationFrame(animate);
				} else {
					//Remote();
					//console.log('Animasi selesai.');
				}
			}
			//var mc = document.getElementById(str);
			let startTime = null;// perlu di null kan lagi setiap mau di animasi kan
			const duration = 1000; // Durasi 0.5 detik dalam milidetik
			requestAnimationFrame(animate);
		}
		function mcAnimateRotate(mc){
			function animate(timestamp) {
				if (!startTime) startTime = timestamp;
				const elapsed = timestamp - startTime;
				var sdt = Math.min(elapsed / duration * 90 , 90);
				const progress = 180*Math.sin(sdt*Math.PI/180);
				const progx = -50*Math.sin(sdt*Math.PI/180);
				const progy = -50*Math.sin(sdt*Math.PI/180);
				mc.style.left = ''+(xybtn[0][0]+progx)+'px';
				mc.style.top = ''+(xybtn[0][1]+progy)+'px';
				
				mc.style.transform = "rotate("+progress+"deg)";
				if (elapsed < duration) {
					requestAnimationFrame(animate);
				} else {
					//Remote();
					//console.log('Animasi selesai.');
				}
			}
			mc.style.transformOrigin = "50% 50%";
			//var mc = document.getElementById(str);
			let startTime = null;// perlu di null kan lagi setiap mau di animasi kan
			const duration = 1000; // Durasi 0.5 detik dalam milidetik
