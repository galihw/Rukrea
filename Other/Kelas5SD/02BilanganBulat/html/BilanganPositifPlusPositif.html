	<script>
		function RandomAngkaAtoB(a,b){ 
			var r = a+Math.ceil(Math.random() * b);
			return r;
		}
		function RandomMyArray(Arr){
			for (var i=0; i<Arr.length; i++){
				var r = Math.floor(Math.random() * Arr.length);
				var a = Arr[i];
				Arr[i] = Arr[r];
				Arr[r] = a;
			}
			return Arr
		}

	<script>
		//animasi in out
		var dxx = 100;// jarak titik titik
		arorang[0].style.display = "";
		artitik[0].style.display = "";
		
		function mcAnimateOrang(a,b){
			function animate(timestamp) {
				if (!startTime) startTime = timestamp;
				const elapsed = timestamp - startTime;
				var ct = Math.round(Math.min(elapsed / duration * 4 , 4)); 	// 90 derajat; 
				
				for(var i=0;i<=4;i++){
					arorang[i].style.display = "none";
				}
				arorang[ct].style.display = "";
				if (elapsed < duration) {
					requestAnimationFrame(animate);
				} else {
					ntitik++;
					console.log(ntitik);
					if(ntitik<nmax){
						startTime = null; //perlu di null kan lagi setiap mau di animasi kan
						mcorang.x += dxx;
						mcorang.style.left = ''+mcorang.x+'px';
						arorang[4].style.display = "none";
						arorang[0].style.display = "";
						requestAnimationFrame(animate);
					}else{
						step++;
						if(step==1){
							mcorang.x += dxx;
							mcorang.style.left = ''+mcorang.x+'px';
							arorang[4].style.display = "none";
							arorang[0].style.display = "";
							mcAnimateAlpha('p0'); // panah ke1
						}else if(step==6){
							mcAnimateAlpha('p1'); // panah ke2
						}
						//console.log('Animasi selesai.');
					}
					artitik[ntitik].style.display = "";
				}
			}
			const duration = 500; // Durasi 0.5 detik dalam milidetik
			var ntitik = a;
			var nmax = b;
			let startTime = null; //perlu di null kan lagi setiap mau di animasi kan
			requestAnimationFrame(animate);
		}
		
		function mcAnimateAlpha(str){
			function animate(timestamp) {
				if (!startTime) startTime = timestamp;
				const elapsed = timestamp - startTime;
				var sdt = Math.min(elapsed / duration * 90 , 90);
				const progress = Math.sin(sdt*Math.PI/180);
				
				mc.style.opacity = ''+progress+'';
				if (elapsed < duration) {
					requestAnimationFrame(animate);
				} else {
					step++;
					if(step==0){
						mcAnimateOrang(0,2); // lompatan ke1
					}else if(step==2){
						mcAnimateAlpha('v1'); // vertikal ke2
					}else if(step==3){
						mcAnimateAlpha('a0') // angka ke1
					}else if(step==4){
						mcAnimateAlpha('a1') // angka ke2
					}else if(step==5){
						mcAnimateOrang(2,5); // lompatan ke2
					}else if(step==7){
						mcAnimateAlpha('v2'); // vertikal ke3
					}else if(step==8){
						mcAnimateAlpha('a2'); // angka ke3
					}else if(step==9){
						mcAnimateAlpha('a3'); // angka ke4
					}else if(step==10){
						mcAnimateAlpha('a4'); // angka ke5
					}
					//console.log('Animasi selesai.');
				}
			}
			var mc = document.getElementById(str);
			let startTime = null;// perlu di null kan lagi setiap mau di animasi kan
			const duration = 1500; // Durasi 0.5 detik dalam milidetik
			requestAnimationFrame(animate);
		}
		
	</script>

	<script>

		function XYbenda(){
			myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
			myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
			myBG.style.left = ''+(myBG.x)+'px';

			}
		}
		function ZoomAll(){
			lebarJendela = window.innerWidth;
			tinggiJendela = window.innerHeight;
			var xscale = lebarJendela/840;
			var yscale = tinggiJendela/472;
			scl = 0.95*Math.min(xscale,yscale);
			fixzoom = scl*100;
			document.body.style.zoom = ""+fixzoom+"%";
			XYbenda();
		}
		
		ZoomAll();
		function handleClick(event) {
			console.log("handleClick");
		}
		myBG.addEventListener('click', handleClick);
		setTimeout(() => {
			console.log("handleClick")
			ZoomAll();
