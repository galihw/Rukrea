    <script>
		
		function DrawAngle(n1,n2,n3){
			const xo = arTetap[n1].offsetLeft;
			const yo = arTetap[n1].offsetTop;
			const xp = arTetap[n2].offsetLeft;
			const yp = arTetap[n2].offsetTop;
			const xq = arTetap[n3].offsetLeft;
			const yq = arTetap[n3].offsetTop;
			
			// Sudut dalam derajat (0 derajat ada di posisi jam 3)
            var angleA = Math.atan2(yp - yo, xp - xo);
            var angleC = Math.atan2(yq - yo, xq - xo);
			
			degreeA = angleA*180/Math.PI;
			degreeC = angleC*180/Math.PI;
			var ddegree = Math.abs(degreeC-degreeA);
			
			var cvrtA = 0;
			var cvrtC = 0;
			if(degreeA>=-180 && degreeA<0)	cvrtA = degreeA+360; else cvrtA = degreeA;
			if(degreeC>=-180 && degreeC<0)	cvrtC = degreeC+360; else cvrtC = degreeC;
			var cvrtd = degreeC-degreeA;
			
			//console.log(cvrtd)
			var ff1,ff2,ff3,ff;
			ff1 = cvrtd<=0 && cvrtd>=-180;
			ff2 = cvrtd>=180;
			ff = ff1 || ff2;
			return [xo,yo,angleA,angleC,ff];
		}

			const xo = titikpusat.offsetLeft;
			const yo = titikpusat.offsetTop;
			const xp = arTetap[n2].offsetLeft;

			const yq = arTetap[n3].offsetTop;
			
			// Sudut dalam derajat (0 derajat ada di posisi jam 3)
            var angleA = Math.atan2(yp - yo, xp - xo);
            var angleC = Math.atan2(yq - yo, xq - xo);
			
			degreeA = angleA*180/Math.PI;
			degreeC = angleC*180/Math.PI;
			//console.log(degreeC-degreeA)
			var ddegree = Math.abs(degreeC-degreeA);
			
			var cvrtA = 0;
			var cvrtC = 0;
			if(degreeA>=-180 && degreeA<0)	cvrtA = degreeA+360; else cvrtA = degreeA;
			if(degreeC>=-180 && degreeC<0)	cvrtC = degreeC+360; else cvrtC = degreeC;
			var cvrtd = degreeC-degreeA;
			
			//console.log(cvrtd)
			var ff1,ff2,ff3,ff;
			ff1 = cvrtd<=0 && cvrtd>=-180;
			ff2 = cvrtd>=180;
			ff = ff1 || ff2;
			return [xo,yo,angleA,angleC,ff];
		}

	<script>
		var selectedEl = null;
		const controller = new AbortController();
        function selectElement(el) {
            UnselectElement(el)
            selectedEl = el;
            //selectedEl.classList.add('terseleksi');
        }
        function UnselectElement(el) {
            if (selectedEl) {
                //selectedEl.classList.remove('terseleksi');
                //selectedEl.classList.remove('dropbenar');
				selectedEl = null;
            }
        }
		function setupDraggable(el,mc) {
			//var xmax = (mc.offsetWidth-el.offsetWidth);
			//var ymax = (mc.offsetHeight-el.offsetHeight);
			//var xmax = (myBG.w-el.offsetWidth/2);
			//var ymax = (myBG.h-el.offsetHeight/2);
			//var xmin = el.offsetWidth/2;
			//var ymin = el.offsetHeight/2;
			var xmax = (mc.w-el.offsetWidth/2);
			var ymax = (mc.h-el.offsetHeight/2);
			var xmin = mc.x+40;
			var ymin = mc.y+40;
			let startX=0, startY=0, initialX=0, initialY=0;
			let newX=0, newY=0;
            el.addEventListener('mousedown', dragMouseDown, { signal: controller.signal });
            el.addEventListener('touchstart', dragMouseDown, { signal: controller.signal }, { passive: false });
			
			el.ff = false;
            function dragMouseDown(e) {
                e.preventDefault();
                selectElement(el);
				if(e.type==="touchstart"){
					startX = e.touches[0].clientX;
					startY = e.touches[0].clientY;
					initialX = el.offsetLeft;
					initialY = el.offsetTop;
					document.addEventListener('touchend', dragMouseUp);
					document.addEventListener('touchmove', dragMouseMove, { passive: false });
				}else{
					startX = e.clientX;
					startY = e.clientY;
					initialX = el.offsetLeft;
					initialY = el.offsetTop;
					document.addEventListener('mouseup', dragMouseUp);
					document.addEventListener('mousemove', dragMouseMove);
				}
				swapzindex(el.no);
				DrawSegitiga();
            }

            function dragMouseMove(e) {
                e.preventDefault();
				let deltaX=0;
				let deltaY=0;
				if(e.type==="touchmove"){
					deltaX = (e.touches[0].clientX - startX) / scl;
					deltaY = (e.touches[0].clientY - startY) / scl;
				}else{
					deltaX = (e.clientX - startX) / scl;
					deltaY = (e.clientY - startY) / scl;
				}
				newX = initialX + deltaX;
				newY = initialY + deltaY;
				newX = Math.max(xmin,Math.min(xmax,newX));
				newY = Math.max(ymin,Math.min(ymax,newY));
				
				var ddx = newX-320;
				var ddy = newY-220;
				var sdt0 = Math.atan2(ddy,ddx);
				var sdt0_C = Math.round(sdt0*180/Math.PI)*Math.PI/180;
				//console.log(Math.round(sdt0*180/Math.PI));
				//newX = 320+100*Math.cos(sdt0);
				//newY = 220+100*Math.sin(sdt0);
				newX = 320+100*Math.cos(sdt0_C);
				newY = 220+100*Math.sin(sdt0_C);
				//el.x = newX;
				//el.y = newY;
				el.style.left = newX + "px";
				el.style.top = newY + "px";
				xybtn[el.i][0] = newX;
				xybtn[el.i][1] = newY;
				mcfix[el.i+1].style.left = (newX)+'px';
				mcfix[el.i+1].style.top = (newY)+'px';
				DrawSegitiga()
            }
			
            function dragMouseUp() {
                document.removeEventListener('mouseup', dragMouseUp);
                document.removeEventListener('mousemove', dragMouseMove);
                document.removeEventListener('touchend', dragMouseUp);
                document.removeEventListener('touchmove', dragMouseMove);
				CekDrop();
				DrawSegitiga();
            }
			function CekDrop() {
				//XYbenda();
				UnselectElement(el);
			}
			
			function swapzindex(no){
				const potong = arFIFO.splice(no, 1)[0];
				arFIFO.push(potong);
				for (var i=1;i<=3;i++){
					arFIFO[i-1].no = i-1;
					arFIFO[i-1].style.zIndex = ""+(arFIFO[i-1].no+10)+"";
				}
			}
        }
		function DrawSudut(canv,a,b,c){
			var Ar = DrawAngle(a,b,c);
			const canvas = document.getElementById(canv);
			const ctx = canvas.getContext('2d');

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
			ctx.clearRect(0, 0, canvas.width, canvas.height);
			
			var rr = 50; // jari-jari lingkaran sudut
			ctx.save(); // Simpan state awal kanvas
			ctx.translate(rr, rr);
			ctx.beginPath();
			ctx.moveTo(0,0);
			//ctx.arc(Ar[3],Ar[4], 30, Ar[0], Ar[4], Ar[2]);//ctx.arc(x, y, radius, startAngle, endAngle, counterclockwise);
			ctx.arc(0,0, rr, Ar[2], Ar[3], Ar[4]);//ctx.arc(x, y, radius, startAngle, endAngle, counterclockwise);
			ctx.lineTo(0,0);
			ctx.fillStyle = '#0096c7';
			ctx.fill();
			ctx.closePath();
			ctx.restore(); // Kembalikan state kanvas seperti semula
			/*
			var sdtF = 0;
			if(!Ar[4]) 	sdtF = (Ar[3]-Ar[2])*180/Math.PI;
			else 		sdtF = (Ar[2]-Ar[3])*180/Math.PI;
			if(sdtF<0)	return 360+sdtF;
			else		return sdtF;
			*/
			//return sdtF;
			return (Ar[3]-Ar[2])*180/Math.PI;
		}
		function DrawSudutPusat(canv,b,c,warna){
			var Ar = DrawAnglePusat(b,c);
			const canvas = document.getElementById(canv);
			const ctx = canvas.getContext('2d');

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
			ctx.clearRect(0, 0, canvas.width, canvas.height);
			
			var rr = 50; // jari-jari lingkaran sudut
			ctx.save(); // Simpan state awal kanvas
			ctx.translate(rr, rr);
			ctx.beginPath();
			ctx.moveTo(0,0);
			//ctx.arc(Ar[3],Ar[4], 30, Ar[0], Ar[4], Ar[2]);//ctx.arc(x, y, radius, startAngle, endAngle, counterclockwise);
			// aslinya ini //ctx.arc(0,0, rr, Ar[2], Ar[3], Ar[4]);//ctx.arc(x, y, radius, startAngle, endAngle, counterclockwise);
			ctx.arc(0,0, rr, Ar[2], Ar[3], false);//ctx.arc(x, y, radius, startAngle, endAngle, counterclockwise);
			ctx.lineTo(0,0);
			//ctx.fillStyle = '#0096c7';
			ctx.fillStyle = warna;
			ctx.fill();
			ctx.closePath();
			ctx.restore(); // Kembalikan state kanvas seperti semula
			
			var sdtF = 0;
			if(!Ar[4]) 	sdtF = (Ar[3]-Ar[2])*180/Math.PI;
			else 		sdtF = (Ar[2]-Ar[3])*180/Math.PI;
			if(sdtF<0)	return 360+sdtF;
			else		return sdtF;
			//return sdtF;
		}
		function DrawGaris(canv){
			const canvas = document.getElementById(canv);
			const ctx = canvas.getContext('2d');
			
			ctx.clearRect(0, 0, canvas.width, canvas.height);
			ctx.beginPath();
			ctx.strokeStyle = '#000000'; // Warna merah
			ctx.lineWidth = 2; // Ketebalan garis 5px
			ctx.lineJoin = "round";
			
			ctx.arc(320, 220, 100, 0, 2 * Math.PI);
			
			ctx.moveTo(xybtn[0][0],xybtn[0][1]);
			ctx.lineTo(xybtn[1][0],xybtn[1][1]);
			ctx.lineTo(320,220);
			ctx.lineTo(xybtn[2][0],xybtn[2][1]);
			ctx.lineTo(xybtn[0][0],xybtn[0][1]);
			
			ctx.closePath();
			ctx.stroke();
		}
		function Koma2Angka(n){
			return StringDesimal(Math.round(n*100)/100);
		}
		function Koma1Angka(n){
			return StringDesimal(Math.round(n*10)/10);
		}
		function TanpaKoma(n){
			return Math.round(n);
		}
