<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segitiga</title>
	<style>
		.bg {
			position: absolute;
			width: 840px;
			height: 472px;
			background-color: grey;
			user-select: none;
			-webkit-user-select: none;
			overflow: hidden;
		}
		.terseleksi {
			box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
			user-select: none;
			-webkit-user-select: none;
		}
		.myCanvas {
			position: absolute;
			cursor: default;
		}
		.myCanvasArea {
			position: absolute;
			cursor: default;
			width: 100px; 
			height: 100px;
			/*transform: translate(-50%, -50%);*/
		}
		.myDiv {
			position: absolute;
			cursor: default;
			width: 100px; 
			height: 100px;
			transform: translate(-50%, -50%);
		}
		.textbox {
			position: absolute;
			font-family: Arial, Helvetica, sans-serif;
			font-size: 20px;
			color: #ffffff;
			background-color: #000000;
			width: 140px;
			height: 120px;
			transform: translate(-50%, -50%);
			display: flex;
			justify-content: center;
			align-items: center;
			text-align: center;
			user-select: none;
			-webkit-user-select: none;
		}
		.textAB {
			cursor: pointer;
			position: absolute;
			font-family: Arial, Helvetica, sans-serif;
			font-size: 20px;
			color: #ffffff;
			/*background-color: #000000;*/
			width: 140px;
			height: 40px;
			transform: translate(-50%, -50%);
			display: flex;
			justify-content: center;
			align-items: center;
			text-align: center;
		}
		.textABsmall {
			cursor: pointer;
			position: absolute;
			font-family: Arial, Helvetica, sans-serif;
			font-size: 14px;
			color: #ffffff;
			/*background-color: #000000;*/
			width: 180px;
			height: 40px;
			transform: translate(-50%, -50%);
			display: flex;
			justify-content: center;
			align-items: center;
			text-align: center;
		}
		.isibtn {
			position: absolute;
			width: 600px;
			height: 420px;
			overflow: clip;/* Options: visible, hidden, scroll, auto, clip */
		}
		.isiks {
			position: absolute;
			width: 50px;
			height: 50px;
			/*transform: translate(-50%, -50%);*/
			user-select: none;
			-webkit-user-select: none;
			
		}
		.mcsegitiga {
			position: absolute;
			width: 0px;
			height: 0px;
			transform: translate(-50%, -50%);
			user-select: none;
			-webkit-user-select: none;
		}
		.garisV {
			position: absolute;
			height: 300px;
			width: 0;
			border-left: 2px solid yellow;
		}
		.garisH {
			position: absolute;
			height: 0;
			width: 300px;
			border-top: 2px solid yellow;
		}
		.myCanvas {
			position: absolute;
			cursor: default;
			user-select: none;
			-webkit-user-select: none;
		}
	</style>
</head>
<body>
	<div class ="bg" id="bg">
		
		<div class="textAB" id="acak" style="background-color:black"></div>
		<div class="textAB" id="pjg" style="background-color:red"></div>
		<div class="textAB" id="lbr" style="background-color:green"></div>
		<div class="textAB" id="luas" style="background-color:brown"></div>
		<div class="textABsmall" id="nama" style="background-color:magenta"></div>
		<div class="garisV" id="V1"></div>
		<div class="garisV" id="V2"></div>
		<div class="garisH" id="H1"></div>
		<div class="garisH" id="H2"></div>
		<div class='mcsegitiga' id="mcsegitiga">
			<canvas class="myCanvas" id="segitiga" width="600" height="400" ></canvas>
		</div>
		<div class='mcsegitiga' id="mcbantu">
			<canvas class="myCanvas" id="bantusegitiga" width="600" height="400" ></canvas>
		</div>
	</div>
	<script>
		function RandomAngkaAtoB(a,b){ 
			var r = a+Math.ceil(Math.random() * b);
			return r;
		}
		function RandomMyArray(Arr){
			for (var i=0; i<Arr.length; i++){
				var r = Math.floor(Math.random() * Arr.length);
				var a = Arr[i];
				Arr[i] = Arr[r];
				Arr[r] = a;
			}
			return Arr
		}
		function StringDesimal(ff){
			var strff = ""+ff;
			const gg = strff.split(".");
			if(gg.length==2)	return gg[0]+","+gg[1];
			else 				return ff
		}
	</script>
	<script>
		const cX = window.scrollX;
		const cY = window.scrollY;
		const myBG = document.getElementById("bg");
		const mcsegitiga = document.getElementById("mcsegitiga");
		const mcbantu = document.getElementById("mcbantu");
		const acak = document.getElementById("acak");
		const pjg = document.getElementById("pjg");
		const lbr = document.getElementById("lbr");
		const luas = document.getElementById("luas");
		const nama = document.getElementById("nama");
		
		
		const H1 = document.getElementById("H1");
		const H2 = document.getElementById("H2");
		const V1 = document.getElementById("V1");
		const V2 = document.getElementById("V2");
		
		
		myBG.style.backgroundImage = "url(../img/bg2.png)";
		let lebarJendela = window.innerWidth;
		let tinggiJendela = window.innerHeight;
		var scl = 1;
		myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
		myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
		myBG.style.left = ''+(myBG.x)+'px';
		myBG.style.top = ''+(myBG.y)+'px';
		myBG.w = 840;
		myBG.h = 472;
		
		
		acak.style.left = 730+'px';
		acak.style.top = 50+'px';
		
		pjg.style.left = 730+'px';
		pjg.style.top = 150+'px';
		lbr.style.left = 730+'px';
		lbr.style.top = 200+'px';
		nama.style.left = 730+'px';
		nama.style.top = 300+'px';
		luas.style.left = 730+'px';
		luas.style.top = 350+'px';
		
		mcsegitiga.style.left = 20+'px';
		mcsegitiga.style.top = 20+'px';
		mcbantu.style.left = 20+'px';
		mcbantu.style.top = 20+'px';
		
		mcbantu.style.display = "none";
		
		V1.style.display = "none";
		V2.style.display = "none";
		H1.style.display = "none";
		H2.style.display = "none";
		
	</script>
	<script>
	
		var fixscale = 1;
		var fixzoom
		document.body.style.backgroundColor = "black";
		window.addEventListener('resize', () => {
			ZoomAll();
		});
		function XYbenda(){
			lebarJendela = window.innerWidth;
			tinggiJendela = window.innerHeight;
			myBG.x = window.scrollX+(lebarJendela-840*scl)/2;
			myBG.y = window.scrollY+(tinggiJendela-472*scl)/2;
			myBG.style.left = ''+(myBG.x)+'px';
			myBG.style.top = ''+(myBG.y)+'px';
		}
		function ZoomAll(){
			let lebarJendela = window.innerWidth;
			let tinggiJendela = window.innerHeight;
			var xscale = lebarJendela/840;
			var yscale = tinggiJendela/472;
			scl = 0.95*Math.min(xscale,yscale);
			fixscale = scl;
			fixzoom = scl*100;
			document.body.style.zoom = ""+fixzoom+"%";
			XYbenda();
		}
		
		ZoomAll();
		function handleClick(event) {
			console.log("handleClick");
		}
		myBG.addEventListener('click', handleClick);
		setTimeout(() => {
			console.log("handleClick")
			ZoomAll();
			myBG.removeEventListener('click', handleClick);
		}, 100);
		
	</script>
	<script>
		function DrawSegitiga(canv,canv2,a,t){
			const canvas = document.getElementById(canv);
			const ctx = canvas.getContext('2d');
			const canvas2 = document.getElementById(canv2);
			const ctx2 = canvas2.getContext('2d');
			
			ctx.clearRect(0,0, canvas.width, canvas.height);
			ctx2.clearRect(0,0, canvas.width, canvas.height);
			/*
			ctx2.beginPath();
			ctx2.moveTo(50+50*a,350);
			ctx2.lineTo(50+50*a,350-50*t);
			ctx2.lineTo(50     ,350-50*t);
			ctx2.lineTo(50+50*a,350);
			ctx2.lineJoin = "round";
			ctx2.strokeStyle = 'rgba(0, 0, 0, 0.3)'; // Warna 
			ctx2.lineWidth = 2; // Ketebalan garis 
			ctx2.closePath();
			ctx2.stroke();
			*/
			
			ctx2.beginPath();
			ctx2.fillStyle = 'rgba(86, 99, 207, 0.1)'; // Warna
			ctx2.moveTo(50,350);
			ctx2.lineTo(50+50*a,350);
			ctx2.lineTo(50,350-50*t);
			ctx2.lineTo(50,350);
			ctx2.lineJoin = "round";
			ctx2.fill()
			ctx2.strokeStyle = 'rgba(0, 0, 0, 0.3)'; // Warna 
			ctx2.lineWidth = 4; // Ketebalan garis 
			ctx2.closePath();
			ctx2.stroke();
			
			ctx.beginPath();
			ctx.fillStyle = 'rgba(86, 99, 207, 0.3)'; // Warna
			ctx.moveTo(50,350);
			ctx.lineTo(50+50*a,350);
			ctx.lineTo(50,350-50*t);
			ctx.lineTo(50,350);
			ctx.lineJoin = "round";
			ctx.fill()
			ctx.strokeStyle = '#000000'; // Warna 
			ctx.lineWidth = 4; // Ketebalan garis 
			ctx.closePath();
			ctx.stroke();
			
			
			mcbantu.style.transformOrigin = ""+(50+50*a/2)+"px "+(350-50*t/2)+"px";
			return 0;
		}
	</script>
	<script>
		function mcAnimateRotate(mc){
			function animate(timestamp) {
				if (!startTime) startTime = timestamp;
				const elapsed = timestamp - startTime;
				var sdt = Math.min(elapsed / duration * 180 , 180);
				
				mc.style.transform = "rotate("+sdt+"deg)";
				if (elapsed < duration) {
					requestAnimationFrame(animate);
				} else {
					
				}
			}
			let startTime = null;// perlu di null kan lagi setiap mau di animasi kan
			const duration = 1500; // Durasi 0.5 detik dalam milidetik
			requestAnimationFrame(animate);
		}
	</script>
	<script>
		//random plt
		function GetSegitiga(){
			
			var aa = RandomAngkaAtoB(0,10);
			var tt = RandomAngkaAtoB(0,6);
			DrawSegitiga('segitiga','bantusegitiga',aa,tt)
			
			acak.innerHTML = 'Soal Baru';	
			pjg.innerHTML = 'a = ?';
			lbr.innerHTML = 't = ?';
			luas.innerHTML = 'luas = ?';
			nama.innerHTML = 'Segitiga Bantuan Luas';
			pjg.klik=false;
			lbr.klik=false;
			luas.klik=false;
			nama.klik=false;
			
			mcsegitiga.aa = aa;
			mcsegitiga.tt = tt;
			mcsegitiga.luas = StringDesimal((aa*tt)/2);//(aa*tt)/2;
			
			mcbantu.style.display = "none";
			
		}
		
		GetSegitiga();
	</script>
    <script>
		pjg.addEventListener('click', ()=>{
			pjg.klik = !pjg.klik;
			if(pjg.klik)	pjg.innerHTML = 'a = '+mcsegitiga.aa;
			else			pjg.innerHTML = 'a = ?';
		});
		lbr.addEventListener('click', ()=>{
			lbr.klik = !lbr.klik;
			if(lbr.klik)	lbr.innerHTML = 't = '+mcsegitiga.tt;
			else			lbr.innerHTML = 't = ?';
		});
		luas.addEventListener('click', ()=>{
			luas.klik = !luas.klik;
			if(luas.klik)	luas.innerHTML = 'luas = '+mcsegitiga.luas;
			else			luas.innerHTML = 'luas = ?';
		});
		nama.addEventListener('click', ()=>{
			nama.klik = !nama.klik;
			if(nama.klik){
				mcbantu.style.display = "";
				mcAnimateRotate(mcbantu);
			}else{
				mcbantu.style.display = "none";
			}
		});
		
		acak.addEventListener('click', ()=>{
			GetSegitiga();
		});
		
		
    </script>
	<script>
	</script>
</body>
</html>
